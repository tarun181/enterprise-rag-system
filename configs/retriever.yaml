chunking:
  chunk_size: 1000
  chunk_overlap: 250
embeddings:
  dense_model: "BAAI/bge-reranker-base"
  cross_encoder: "cross-encoder/ms-marco-MiniLM-L-6-v2"
search:
  top_k_retrieve: 20     # Pre-reranking fetch
  top_k_final: 8         # Post-reranking context window
  hybrid_alpha: 0.3      # 0.5 = equal weight to BM25 and Dense